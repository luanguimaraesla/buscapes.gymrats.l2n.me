baseURL = 'https://buscapes.gymrats.l2n.me/'
locale = 'pt-br'
title = 'Buscapés GymRats'

[params]
  season = "Verão"
  seasonEmoji = "☀️"
  year = 2026
  startDate = "2026-01-05"
  endDate = "2026-04-15"
  totalDays = 101
  description = "Campeonato Buscapés das Estações 2026 - Resultados da Etapa Verão"

[build]
  [build.buildStats]
    enable = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menus]
  [[menus.main]]
    name = "Ranking"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "Estatísticas"
    url = "/estatisticas/"
    weight = 2
  [[menus.main]]
    name = "Premiações"
    url = "/premiacoes/"
    weight = 3
  [[menus.main]]
    name = "Regulamento"
    url = "/regulamento/"
    weight = 4
