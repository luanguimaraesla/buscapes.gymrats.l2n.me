{{ $monthly := hugo.Data.monthly }}
<div class="chart-container">
  <canvas id="monthlyChart"></canvas>
</div>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var data = {{ $monthly | jsonify | safeJS }};
  var palette = ['#ff6b35','#f7c948','#34d399','#60a5fa','#a78bfa','#f87171','#2dd4bf','#fb923c','#94a3b8','#cd7f32'];
  var datasets = data.datasets.map(function(ds, i) {
    return {
      label: ds.label,
      data: ds.data,
      backgroundColor: palette[i % palette.length],
      borderRadius: 6,
      borderSkipped: false,
      barPercentage: 0.7,
      categoryPercentage: 0.8
    };
  });
  new Chart(document.getElementById('monthlyChart'), {
    type: 'bar',
    data: { labels: data.labels, datasets: datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            color: '#9ca3af',
            usePointStyle: true,
            pointStyleWidth: 10,
            padding: 15,
            font: { family: "'Inter', sans-serif", size: 11 }
          }
        },
        tooltip: {
          backgroundColor: '#1e2235',
          titleColor: '#f0f0f5',
          bodyColor: '#9ca3af',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          cornerRadius: 8,
          padding: 12
        }
      },
      scales: {
        y: {
          title: { display: true, text: 'Dias \u00fanicos', color: '#6b7280', font: { size: 11 } },
          beginAtZero: true,
          grid: { color: 'rgba(255,255,255,0.04)', drawTicks: false },
          border: { display: false },
          ticks: { color: '#6b7280', padding: 8, font: { size: 11 } }
        },
        x: {
          grid: { display: false },
          border: { display: false },
          ticks: { color: '#9ca3af', font: { size: 12, weight: '500' } }
        }
      }
    }
  });
});
</script>
